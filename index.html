<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio // Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/src/style.css" />
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <a href="/" class="logo">RADIO //</a>
    </div>
    <div class="header-right">
      <button class="header-btn" id="favorites-toggle">
        <span class="heart-icon">&#9829;</span>
        <span class="favorites-count">0</span>
      </button>
      <button class="header-btn" id="filters-toggle">Filters</button>
      <span class="kbd-hint"><kbd>&#8984;</kbd><kbd>K</kbd></span>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Left: Station Grid (40%) -->
    <section class="panel panel--grid" id="grid-panel">
      <div class="grid-header">
        <h2 class="grid-title" id="grid-title">All Stations</h2>
        <span class="grid-count" id="grid-count">0 stations</span>
      </div>
      <div class="station-grid" id="station-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <p>No stations match your filters.</p>
        <button class="btn-clear" id="clear-filters">Clear filters</button>
      </div>
    </section>

    <!-- Right: Map (60%) -->
    <section class="panel panel--map" id="map-panel">
      <div id="map"></div>
    </section>
  </main>

  <!-- Player Bar -->
  <footer class="player-bar" id="player-bar">
    <div class="player-info">
      <div class="player-station" id="player-station">Select a station</div>
      <div class="player-meta" id="player-meta"></div>
    </div>
    <div class="player-controls">
      <button class="player-btn" id="btn-prev">&#9198;</button>
      <button class="player-btn player-btn--large" id="btn-play">&#9654;</button>
      <button class="player-btn" id="btn-next">&#9197;</button>
    </div>
    <div class="player-extras">
      <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.01" value="0.8" />
      <button class="player-btn" id="btn-favorite">&#9829;</button>
      <div class="sleep-dropdown">
        <button class="player-btn" id="btn-sleep">&#128164;</button>
        <div class="sleep-menu" id="sleep-menu">
          <button data-min="15">15 min</button>
          <button data-min="30">30 min</button>
          <button data-min="60">60 min</button>
          <button data-min="90">90 min</button>
          <button data-min="0">Off</button>
        </div>
      </div>
    </div>
  </footer>

  <!-- Search Modal -->
  <div class="search-modal" id="search-modal" style="display:none;">
    <div class="search-backdrop"></div>
    <div class="search-container">
      <input type="text" class="search-input" id="search-input" placeholder="Search stations, countries, tags..." />
      <div class="search-results" id="search-results"></div>
      <div class="search-footer">
        <span><kbd>&#8593;</kbd><kbd>&#8595;</kbd> Navigate</span>
        <span><kbd>&#8629;</kbd> Play</span>
        <span><kbd>Esc</kbd> Close</span>
      </div>
    </div>
  </div>

  <!-- Filter Sidebar -->
  <aside class="filter-sidebar" id="filter-sidebar">
    <div class="filter-header">
      <h3>Filters</h3>
      <button class="close-btn" id="close-filters">&#10005;</button>
    </div>
    <div class="filter-body" id="filter-body">
      <div class="filter-section">
        <h4>Country</h4>
        <div class="filter-list" id="filter-countries"></div>
      </div>
      <div class="filter-section">
        <h4>Tags</h4>
        <div class="filter-list" id="filter-tags"></div>
      </div>
      <div class="filter-section">
        <h4>Bitrate</h4>
        <div class="filter-list" id="filter-bitrates"></div>
      </div>
    </div>
  </aside>

  <!-- Single audio element -->
  <audio id="audio-player" crossorigin="anonymous"></audio>
</body>
</html>
